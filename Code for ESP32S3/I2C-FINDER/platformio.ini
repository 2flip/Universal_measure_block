[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_port = /dev/cu.usbmodem14*
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
; build_flags =
;     -Werror
;     -pedantic-errors
;     -Wall
;     -Wextra
;     -Wpedantic
;     -Wcast-align
;     -Wcast-qual
;     -Wconversion
;     -Wctor-dtor-privacy
;     -Wduplicated-branches
;     -Wduplicated-cond
;     -Wextra-semi
;     -Wfloat-equal
;     -Wlogical-op
;     -Wnon-virtual-dtor
;     -Wold-style-cast
;     -Woverloaded-virtual
;     -Wredundant-decls
;     -Wsign-conversion
;     -Wsign-promo 